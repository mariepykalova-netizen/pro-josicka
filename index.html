<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro tebe 💖</title>

<style>
body {
  margin: 0;
  height: 100vh;
  font-family: "Segoe UI", sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
  overflow: hidden;
}

/* Karty */
.card {
  background: rgba(255,255,255,0.9);
  padding: 2rem;
  border-radius: 20px;
  text-align: center;
  max-width: 400px;
  box-shadow: 0 15px 30px rgba(0,0,0,0.15);
}

/* Skryté části */
.hidden {
  display: none;
}

/* Input */
input {
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #ccc;
  margin-top: 1rem;
}

/* Button */
button {
  margin-top: 1rem;
  padding: 10px 16px;
  border: none;
  border-radius: 10px;
  background: #ff6f91;
  color: white;
  cursor: pointer;
}

/* Obálka */
.envelope {
  font-size: 60px;
  cursor: pointer;
  transition: 0.3s;
}

.envelope:hover {
  transform: scale(1.1);
}

/* Srdíčko animace */
.heart {
  position: fixed;
  bottom: -20px;
  font-size: 24px;
  animation: floatUp 5s linear forwards;
}

@keyframes floatUp {
  to {
    transform: translateY(-100vh);
    opacity: 0;
  }
}
</style>
</head>

const startDate = new Date("2026-05-05");

function loadMessage() {

/* 💗 SMUTNO BUTTON */
